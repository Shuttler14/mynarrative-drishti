# fly-qdrant.toml — Qdrant vector DB on Fly.io

app = "drishti-qdrant"
primary = "iad"

[build]
  image = "qdrant/qdrant:v1.12.0"

[http_service]
  internal_port = 6333
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/healthz"

[mounts]
  source = "drishti_qdrant_data"
  destination = "/qdrant/storage"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
