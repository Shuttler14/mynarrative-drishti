name: "Setup Python + uv"
description: "Install uv, Python 3.12, and sync a workspace package with dev deps"
inputs:
  workdir:
    description: "Package directory to install"
    required: true
runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        cache-dependency-glob: "${{ inputs.workdir }}/pyproject.toml"
    - shell: bash
      run: uv python install 3.12
    - shell: bash
      working-directory: ${{ inputs.workdir }}
      run: uv sync --all-extras --dev
