name: OWASP ZAP Baseline Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL to scan"
        required: true
        default: "https://staging-api.drishti.example"
  schedule:
    - cron: "0 3 * * 1"  # weekly Monday 3am

permissions:
  contents: read
  security-events: write

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ github.event.inputs.target_url || 'https://staging-api.drishti.example' }}
          rules_file_name: "security/zap-rules.tsv"
          cmd_options: >-
            -a
            -j
            -l WARN
            -z "-config spider.maxDuration=1 -config scanner.maxScanDurationInMins=5"
          allow_issue_writing: false
          artifact_name: "zap-baseline-report"
          fail_action: false

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "zap_report.sarif"
          category: "owasp-zap-baseline"

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('zap_report.md')
              ? fs.readFileSync('zap_report.md', 'utf8').slice(0, 60000)
              : 'No report generated. Check the workflow run for details.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## OWASP ZAP Baseline Scan\n\n' + report
            });
