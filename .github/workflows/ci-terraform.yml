name: CI Terraform

on:
  pull_request:
    branches: [main]
    paths: ['platform/terraform/**']

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: platform/terraform/envs/prod } }
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: 1.9.0 }
      - name: Format check
        run: terraform fmt -check -recursive ../../
      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TF_PLAN_ROLE_ARN }}
          aws-region: ap-south-1
      - name: Init
        run: terraform init -backend=false
      - name: Validate
        run: terraform validate
      - name: Plan
        if: ${{ secrets.AWS_TF_PLAN_ROLE_ARN != '' }}
        run: |
          terraform init
          terraform plan -no-color -input=false | tee plan.txt
      - name: Comment plan
        if: ${{ secrets.AWS_TF_PLAN_ROLE_ARN != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('platform/terraform/envs/prod/plan.txt', 'utf8').slice(0, 60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo,
              body: '```\n' + plan + '\n```'
            });
