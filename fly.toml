# fly.toml — Drishti API on Fly.io

app = "drishti-api"
primary = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  ENV = "production"
  PORT = "8000"
  CORS_ORIGINS = '["https://mynarrative.in","https://www.mynarrative.in"]'
  SHOPIFY_STORE_URL = "https://mynarrative.in"
  SHOPIFY_DOMAIN = "jjdk0v-0c.myshopify.com"
  VTOE_GPU_URL = "https://vton.mynarrative.in"
  AWS_REGION = "eu-north-1"
  S3_BUCKET = "mynarrative-dtf-bucket"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
